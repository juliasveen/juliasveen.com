<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juliasveen.com</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <header id="navigation">
        <div class="nav-icon">MENU</div>
    </header>

    <div id="nav-content">
        <div class="close-btn">X</div>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </div>

    <main class="zine-container">
        <section id="about" class="window hero">
            <div class="window-header">
                <div class="dot-container">
                    <div class="dot" style="background: #ff5f56;"></div>
                    <div class="dot" style="background: #ffbd2e;"></div>
                    <div class="dot" style="background: #27c93f;"></div>
                </div>
                <span>MY_PROFILE.EXE</span>
            </div>
            <div class="content">
                <div class="profile-layout">
                    <div class="profile-text">
                        <h1>DHEEMAN SHRIVASTAV</h1>
                        <p class="typing-container">I am a <span id="typed-text"></span></p>
                        <p>Graphic designer and video editor with 5+ years of experience.</p>
                    </div>
                    <div class="profile-img">
                        <img src="https://via.placeholder.com/150" alt="Avatar"> </div>
                </div>
            </div>
        </section>

        <section id="projects" class="window">
            <div class="window-header"><span>PROJECTS.SYS</span></div>
            <div class="content bento-grid">
                <div class="project-card">Graphic Design</div>
                <div class="project-card">Video Editing</div>
                <div class="project-card">3D Artist</div>
            </div>
        </section>

        <section id="contact" class="window">
            <div class="window-header"><span>CONTACT_ME.URL</span></div>
            <div class="content">
                <form id="contact-form">
                    <input type="text" placeholder="Name" class="retro-input">
                    <input type="email" placeholder="Email" class="retro-input">
                    <textarea placeholder="Message" class="retro-input"></textarea>
                    <button type="submit" class="retro-btn">SEND MESSAGE</button>
                </form>
            </div>
        </section>
    </main>

    <button class="scroll-top">↑ TOP</button>

    <script src="script.js"></script>
</body>
</html>
